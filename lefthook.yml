pre-commit:
  commands:
    biome_write:
      glob: "*.{ts,tsx,json}"
      run: bunx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files} && git update-index --again
pre-push:
  commands:
    biome_check:
      glob: "*.{ts,tsx,json}"
      run: bunx biome check --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}